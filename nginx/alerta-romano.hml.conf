# =============================================================================
# Alerta Romano — Vhost NGINX do HOST (Homologação)
# Arquivo: /etc/nginx/sites-available/alerta-romano.hml.conf
#
# Instalar no servidor:
#   sudo cp nginx/alerta-romano.hml.conf /etc/nginx/sites-available/alerta-romano.hml.conf
#   sudo ln -sfn /etc/nginx/sites-available/alerta-romano.hml.conf \
#                /etc/nginx/sites-enabled/alerta-romano.hml.conf
#   sudo rm -f /etc/nginx/sites-enabled/vigia-romano.hml.conf
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# ── Redireciona HTTP → HTTPS ──────────────────────────────────────────────────
server {
    listen 80;
    server_name alertaromano.unicomunitaria.com.br;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — reverse proxy para compose NGINX interno (127.0.0.1:8083) ────────
server {
    listen 443 ssl http2;
    server_name alertaromano.unicomunitaria.com.br;

    # Certificado wildcard gerenciado pelo Certbot no host
    ssl_certificate     /etc/letsencrypt/live/unicomunitaria.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/unicomunitaria.com.br/privkey.pem;

    # ── Parâmetros SSL recomendados ───────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # ── Rotas HTTP/API/Frontend ───────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Informa ao compose NGINX (e ao backend) que a conexão original é HTTPS
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts generosos para o SPA
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # ── WebSocket — requer headers Upgrade/Connection ─────────────────────────
    location /ws/ {
        proxy_pass         http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Mantém conexão WebSocket aberta por até 1 hora
        proxy_read_timeout 3600s;
    }
}
