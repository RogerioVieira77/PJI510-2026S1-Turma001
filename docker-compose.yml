services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: vigia_romano_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Sem ports — banco acessível apenas pela rede Docker interna
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vigia_romano_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    # Sem ports — Redis acessível apenas pela rede Docker interna
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vigia_romano_backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    # Roda migrations antes de subir o servidor
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vigia_romano_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m arq app.worker.tasks.WorkerSettings

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vigia_romano_frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    container_name: vigia_romano_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      # Publicado apenas em localhost — HOST NGINX faz o reverse proxy com SSL
      - "127.0.0.1:8083:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

volumes:
  postgres_data:
  redis_data:
